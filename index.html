<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phumiphat Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
}

/* COVER */
.cover {
    height: 100vh;
    overflow: hidden;
}
.cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BOTTOM */
.bottom {
    display: flex;
    height: 100vh;
}

/* LEFT */
.left {
    width: 50%;
    background: linear-gradient(135deg, #1a1a1a, #333);
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* BUTTON */
.menu a {
    text-decoration: none;
    background: #000;
    color: #fff;
    padding: 14px 30px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
    letter-spacing: 1px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.menu a:hover {
    background: #ff2e2e;
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 10px 25px rgba(255,46,46,0.5);
}

/* RIGHT */
.resume {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}

.resume img {
    width: 85%;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    transition: 0.4s;
}

.resume img:hover {
    transform: scale(1.02);
}

/* 🔥 MOBILE FIX (แก้เรียบร้อย) */
@media (max-width: 768px) {

    .cover {
        height: 60vh;
    }

    .bottom {
        flex-direction: column;
        height: auto;
    }

    .left, .resume {
        width: 100%;
        height: auto; /* ✅ สำคัญ */
    }

    .resume img {
        width: 100%;
    }

    .menu a {
        width: 80%;
        margin: auto;
    }

}
</style>

</head>
<body>

<section class="cover">
    <img src="poto1.png" alt="cover">
</section>

<section class="bottom">

    <div class="left">
        <div class="menu">
            <a href="port1.html">Athletics</a>
            <a href="port2.html">Skill Competition</a>
            <a href="port3.html">Projects</a>
            <a href="port4.html">Student Committee</a>
        </div>
    </div>

    <div class="resume">
        <img src="poto2.png" alt="resume">
    </div>

</section>

</body>
</html>
