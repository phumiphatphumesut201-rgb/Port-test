<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phumiphat Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* COVER */
.cover {
    height: 100vh;
}
.cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BOTTOM */
.bottom {
    display: flex;
    height: 100vh;
}

/* LEFT (ปุ่ม) */
.left {
    width: 50%;
    background: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.menu a {
    text-decoration: none;
    background: #000;
    color: #fff;
    padding: 12px 25px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    transition: 0.3s;
}

.menu a:hover {
    background: #ff2e2e;
}

/* RIGHT (resume) */
.resume {
    width: 50%;
}

.resume img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>

</head>
<body>

<!-- COVER -->
<section class="cover">
    <img src="poto1.png" alt="cover">
</section>

<!-- BOTTOM -->
<section class="bottom">

    <!-- LEFT MENU -->
    <div class="left">
        <div class="menu">
            <a href="port1.html">Athletics</a>
            <a href="port2.html">Skill competition</a>
            <a href="port3.html">Projects</a>
            <a href="port4.html">Student committee member</a>
        </div>
    </div>

    <!-- RIGHT RESUME -->
    <div class="resume">
        <img src="poto2.png" alt="resume">
    </div>

</section>

</body>
</html>
